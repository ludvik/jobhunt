pipeline:
  limit: 30
  tailor_timeout: 120
  apply_timeout: 600
  thinking_level: low
fetch:
  limit: 10
  lookback: 7
  urls:
  - name: recommended
    url: https://www.linkedin.com/jobs/collections/recommended/
  - name: unicorn-companies
    url: https://www.linkedin.com/jobs/collections/unicorn-companies/
  - name: top-startups
    url: https://www.linkedin.com/jobs/collections/top-startups/
  - name: gen-ai
    url: https://www.linkedin.com/jobs/collections/gen-ai/
  - name: ai-and-ml
    url: https://www.linkedin.com/jobs/collections/ai-and-ml/
  - name: remote-jobs
    url: https://www.linkedin.com/jobs/collections/remote-jobs/
  - name: yc-funded
    url: https://www.linkedin.com/jobs/collections/yc-funded/
  - name: mgmt-engineering-manager
    url: https://www.linkedin.com/jobs/search/?keywords=Engineering%20Manager&f_E=4%2C5%2C6&geoId=103644278&sortBy=DD
  - name: mgmt-director-engineering
    url: https://www.linkedin.com/jobs/search/?keywords=Director%20of%20Engineering&geoId=103644278&sortBy=DD
  - name: mgmt-vp-head-engineering
    url: https://www.linkedin.com/jobs/search/?keywords=VP%20Engineering%20Head%20of%20Engineering&geoId=103644278&sortBy=DD
classify:
  enabled: true
  min_experience_years: 5
  exclude_patterns:
  - (?i)\bintern\b
  - (?i)\binternship\b
  - (?i)\bassociate\b
  - (?i)\badministrator\b
  - (?i)\branger\b
  - (?i)\bfront.?end\b
  - (?i)\bui engineer\b
  - (?i)\bux\b
  - (?i)\brecruiter\b
  - (?i)\bsales\b
  - (?i)\bmarketing\b
  - (?i)\baccount.*(manager|executive)\b
  - (?i)\bcustomer.*(success|support)\b
  - (?i)\bhardware engineer\b
  - (?i)\bmechanical engineer\b
  - (?i)\belectrical engineer\b
  - (?i)\bfirmware engineer\b
  - (?i)\bembedded.*firmware\b
  - (?i)\bpower conversion\b
  - (?i)\bcad\b
  - (?i)\bplm\b
  - (?i)\bsolidworks\b
  - "(?i)\bdata engineer\b"
  - "(?i)\bdata engineering\b"
  - (?i)\bmechanical.*(manager|director)\b
  - (?i)\bcivil.*(manager|director)\b
  - (?i)\belectrical.*(manager|director)\b
  - (?i)\bconstruction.*(manager|director)\b
  - (?i)\bmanufacturing.*(manager|director)\b
  blocked_platforms:
  - lever.co
  - ashbyhq.com
  - icims.com
logging:
  level: INFO
  log_file: null
captcha:
  provider: capsolver  # only provider for now
  # API key is read from: CAPSOLVER_API_KEY env var, or macOS Keychain (service: "capsolver", account: "apikey")
  enabled: true
